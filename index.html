<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EuroPrism</title>

<!-- Link preview (WhatsApp / Telegram / Instagram DMs / X). -->
<!-- After deploying, set the content of og:url to your public GitHub Pages URL -->
<!-- (the same value you put in the SHARE_URL constant in the script below). -->
<!-- Description is deliberately neutral — do NOT reveal the quiz's topic here. -->
<meta property="og:title" content="EuroPrism">
<meta property="og:description" content="12 questions · anonymous · your result appears at the end">
<meta property="og:type" content="website">
<meta property="og:url" content="">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="EuroPrism">
<meta name="twitter:description" content="12 questions · anonymous · your result appears at the end">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap');

  :root {
    --ink: #171a21;
    --paper: #f2f3f5;
    --card: #ffffff;
    --accent: #23406e;
    --accent-soft: #e8eef7;
    --tie-soft: #f6efe2;
    --tie: #8a6d2f;
    --line: #dde0e5;
    --muted: #6b7078;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Fill the whole viewport with --paper. body is a centered 560px column,
     so set the page background on html too rather than relying on the
     body→canvas background-propagation rule (which some embedding hosts break). */
  html { background: var(--paper); }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    padding: 24px 16px 60px;
    max-width: 560px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 27px;
    color: var(--ink);
  }

  .lang-toggle {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
  }
  .lang-toggle:hover { border-color: var(--accent); }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

  .share-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
  }
  .share-btn:hover { opacity: 0.85; }

  .sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  .progress-track {
    height: 5px;
    background: var(--line);
    border-radius: 3px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .qnum {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .qtext {
    font-family: 'Newsreader', serif;
    font-size: 21px;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 14px;
    color: var(--ink);
  }

  details {
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  details summary {
    cursor: pointer;
    font-weight: 500;
    list-style: none;
    color: var(--muted);
  }
  details.ctx-block summary { color: var(--accent); }
  details.ctx-block summary::before { content: "ⓘ "; }
  details.tie-block summary { color: var(--tie); }
  details.tie-block summary::before { content: "⚖ "; }
  details[open] summary { margin-bottom: 6px; }
  details .box {
    border-radius: 10px;
    padding: 12px 14px;
    line-height: 1.55;
    color: var(--ink);
  }
  details.ctx-block .box { background: var(--accent-soft); }
  details.tie-block .box { background: var(--tie-soft); }

  .opts-wrap { margin-top: 14px; }

  .opt {
    display: block;
    width: 100%;
    text-align: left;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.45;
    background: var(--card);
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opt:hover { border-color: var(--accent); }
  .opt.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .opt.idk { color: var(--muted); font-style: italic; }

  .nav {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .nav button {
    flex: 1;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
  }
  .nav .next {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .nav button:disabled { opacity: 0.4; cursor: default; }

  #result { display: none; }
  .big-pct {
    font-family: 'Newsreader', serif;
    font-size: 64px;
    font-weight: 500;
    text-align: center;
    margin: 20px 0 4px;
    color: var(--ink);
  }
  .band {
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--ink);
  }
  .meter {
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(90deg, #4a7fb5, #d8dde3, #b5564a);
    position: relative;
    margin-bottom: 30px;
  }
  .meter .pin {
    position: absolute;
    top: -6px;
    width: 4px;
    height: 24px;
    background: var(--ink);
    border-radius: 2px;
    transform: translateX(-50%);
  }
  .meter-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: -22px;
    margin-bottom: 28px;
  }

  .reveal-box {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .reveal-box h3 {
    font-family: 'Newsreader', serif;
    font-size: 19px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .reveal-box ul { margin: 8px 0 8px 18px; }
  .reveal-box li { margin-bottom: 5px; }

  .note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 16px; }

  .restart {
    display: block;
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    margin-top: 14px;
  }

  /* ---------- Share modal ---------- */
  .share-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(23, 26, 33, 0.55);
    z-index: 1000;
    padding: 20px;
    /* centering */
    align-items: center;
    justify-content: center;
  }
  .share-overlay.open { display: flex; }

  .share-modal {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 18px 50px rgba(23, 26, 33, 0.28);
    position: relative;
  }
  .share-modal h2 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 21px;
    color: var(--ink);
    margin-bottom: 14px;
    padding-right: 28px;
  }
  .share-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    font-size: 20px;
    line-height: 1;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 999px;
    cursor: pointer;
  }
  .share-close:hover { border-color: var(--accent); }

  .share-url-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .share-url-input {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 11px 12px;
  }
  .share-copy {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 11px 16px;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .share-copy:hover { opacity: 0.85; }

  .share-apps { display: flex; gap: 8px; }
  .share-app {
    flex: 1;
    text-align: center;
    text-decoration: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 11px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 10px;
  }
  .share-app:hover { border-color: var(--accent); }
</style>
</head>
<body>

<div id="quiz">
  <div class="topbar">
    <h1 id="title"></h1>
    <div class="btn-row">
      <button class="share-btn" id="shareBtn"></button>
      <button class="lang-toggle" id="langBtn"></button>
    </div>
  </div>
  <div class="sub" id="subtitle"></div>
  <div class="progress-track"><div class="progress-fill" id="prog"></div></div>

  <div class="qnum" id="qnum"></div>
  <div class="qtext" id="qtext"></div>
  <details class="ctx-block" id="ctxbox"><summary id="ctxsum"></summary><div class="box" id="ctx"></div></details>
  <details class="tie-block" id="tiebox"><summary id="tiesum"></summary><div class="box" id="tie"></div></details>
  <div class="opts-wrap" id="opts"></div>

  <div class="nav">
    <button id="back"></button>
    <button class="next" id="next" disabled></button>
  </div>
</div>

<div id="result">
  <div class="topbar">
    <h1 id="rtitle"></h1>
    <div class="btn-row">
      <button class="share-btn" id="shareBtn2"></button>
      <button class="lang-toggle" id="langBtn2"></button>
    </div>
  </div>
  <div class="big-pct" id="pct"></div>
  <div class="band" id="band"></div>
  <div class="meter"><div class="pin" id="pin"></div></div>
  <div class="meter-labels"><span id="ml0"></span><span id="ml100"></span></div>

  <div class="reveal-box"><h3 id="r1h"></h3><p id="r1p"></p></div>
  <div class="reveal-box"><h3 id="r2h"></h3><ul id="r2ul"></ul><p id="r2p"></p></div>
  <div class="reveal-box" id="interpbox"><h3 id="r3h"></h3><p id="r3p"></p></div>

  <div class="note" id="rnote"></div>
  <button class="restart" onclick="location.reload()" id="rbtn"></button>
</div>

<div class="share-overlay" id="shareOverlay">
  <div class="share-modal" role="dialog" aria-modal="true" aria-labelledby="shareHeading">
    <button class="share-close" id="shareClose" aria-label="Close">×</button>
    <h2 id="shareHeading"></h2>
    <div class="share-url-row">
      <input type="text" class="share-url-input" id="shareUrlInput" readonly>
      <button class="share-copy" id="shareCopyBtn"></button>
    </div>
    <div class="share-apps">
      <a class="share-app" id="shareWhatsApp" target="_blank" rel="noopener">WhatsApp</a>
      <a class="share-app" id="shareTelegram" target="_blank" rel="noopener">Telegram</a>
    </div>
  </div>
</div>

<script>
// Set this to the public GitHub Pages URL after deploying.
// If left empty, falls back to location.href.
const SHARE_URL = "";

// ---------- UI strings ----------
const UI = {
  pt: {
    title: "EuroPrism",
    subtitle: "12 perguntas · anónimo · o resultado aparece no fim",
    langBtn: "EN — switch to English",
    shareBtn: "Partilhar",
    shareCopied: "Link copiado!",
    shareText: "Faz este questionário e vê onde te posicionas:",
    shareHeading: "Partilhar este questionário",
    shareCopy: "Copiar",
    shareCopyDone: "Copiado!",
    ctxsum: "Contexto (opcional)",
    tiesum: "Indeciso entre duas opções? Faz o teste",
    back: "← Voltar",
    next: "Seguinte →",
    seeResult: "Ver resultado",
    qOf: (a, b) => `Pergunta ${a} de ${b}`,
    idk: "Não sei / prefiro não responder",
    rtitle: "O teu resultado",
    ml0: "0% — oposição total",
    ml100: "100% — apoio total",
    r1h: "O que é que este questionário mediu?",
    r1p: "Este questionário mediu o teu grau de alinhamento com o <b>Save Europe Act</b> — uma Iniciativa de Cidadania Europeia lançada em 2026 (Eva Vlaardingerbroek, Martin Sellner; apoiada por Viktor Orbán, VOX, Chega, entre outros), que já ultrapassou 500 mil assinaturas e pretende chegar a 1 milhão para obrigar a Comissão Europeia a responder.",
    r2h: "O que propõe o Act",
    r2items: [
      "<b>Art. 1:</b> moratória à imigração não-europeia (incluindo vistos de estudo e reagrupamento familiar) e suspensão de asilo para requerentes de países seguros;",
      "<b>Art. 2:</b> reforma das fronteiras com barreiras físicas e tecnológicas e mecanismos de retorno imediato;",
      "<b>Art. 3:</b> deportação sistemática de migrantes ilegais, requerentes recusados e criminosos;",
      "<b>Art. 4:</b> \"remigração\" incentivada de migrantes legais considerados não-integrados ou um \"fardo cultural/financeiro\", para restaurar o \"equilíbrio demográfico\";",
      "<b>Art. 5:</b> corte de apoios sociais a migrantes como forma de dissuasão."
    ],
    r2p: "A Comissão Europeia avisou que pode recusar o registo da iniciativa por partes dela poderem constituir discriminação étnica.",
    r3h: "Interpretação",
    rnote: "Aproximação pedagógica, não um instrumento científico. Cada resposta foi ponderada pela proximidade à posição do Act no tema correspondente; respostas \"não sei\" não contam para a média. A ordem das respostas é aleatória em cada abertura.",
    rbtn: "Refazer",
    undefinedBand: "Posição indefinida",
    undefinedText: "Respondeste \"não sei\" à maioria das perguntas, por isso não é possível calcular uma posição fiável. E isso também é uma resposta válida — este é um tema em que muita gente ainda está a formar opinião.",
    bands: [
      ["Forte oposição", "As tuas respostas rejeitam quase todos os pilares do Save Europe Act — tanto as medidas concretas como a premissa de fundo da preservação etnodemográfica."],
      ["Tendencialmente contra", "Podes concordar com pontos específicos (por ex., deportação de criminosos ou melhor controlo de fronteiras), mas rejeitas o enquadramento central do Act — em particular a lógica categórica baseada na origem."],
      ["Posição mista", "Estás genuinamente dividido: concordas com uma parte substancial das medidas de controlo, mas resistes às propostas mais radicais (remigração de residentes legais, objetivos demográficos explícitos)."],
      ["Tendencialmente a favor", "Alinhas com a maioria das propostas do Act, embora provavelmente com reservas nalgumas das medidas mais duras ou na sua fundamentação etnocultural."],
      ["Forte alinhamento", "As tuas respostas coincidem com praticamente todas as propostas e premissas do Save Europe Act."]
    ],
    bandSuffix: " ao Save Europe Act"
  },
  en: {
    title: "EuroPrism",
    subtitle: "12 questions · anonymous · your result appears at the end",
    langBtn: "PT — mudar para Português",
    shareBtn: "Share",
    shareCopied: "Link copied!",
    shareText: "Take this quiz and see where you stand:",
    shareHeading: "Share this quiz",
    shareCopy: "Copy",
    shareCopyDone: "Copied!",
    ctxsum: "Context (optional)",
    tiesum: "Torn between two options? Take the test",
    back: "← Back",
    next: "Next →",
    seeResult: "See result",
    qOf: (a, b) => `Question ${a} of ${b}`,
    idk: "Don't know / prefer not to answer",
    rtitle: "Your result",
    ml0: "0% — full opposition",
    ml100: "100% — full support",
    r1h: "What did this quiz measure?",
    r1p: "This quiz measured your degree of alignment with the <b>Save Europe Act</b> — a European Citizens' Initiative launched in 2026 (Eva Vlaardingerbroek, Martin Sellner; endorsed by Viktor Orbán, VOX, Chega, among others), which has passed 500,000 signatures and aims for 1 million to force the European Commission to respond.",
    r2h: "What the Act proposes",
    r2items: [
      "<b>Art. 1:</b> a moratorium on non-European immigration (including study and family reunification visas) and suspension of asylum processing for applicants from safe countries;",
      "<b>Art. 2:</b> border reform with physical and technological barriers and immediate return mechanisms;",
      "<b>Art. 3:</b> systematic deportation of illegal migrants, rejected asylum seekers, and criminals;",
      "<b>Art. 4:</b> incentivized \"remigration\" of legal migrants deemed unintegrated or a \"cultural/financial burden,\" to restore \"demographic balance\";",
      "<b>Art. 5:</b> cutting welfare benefits for migrants as a deterrent."
    ],
    r2p: "The European Commission has warned it may refuse to register the initiative because parts of it could constitute ethnic discrimination.",
    r3h: "Interpretation",
    rnote: "A pedagogical approximation, not a scientific instrument. Each answer was weighted by its proximity to the Act's position on the corresponding theme; \"don't know\" answers don't count toward the average. Answer order is randomized on each load.",
    rbtn: "Retake",
    undefinedBand: "Undefined position",
    undefinedText: "You answered \"don't know\" to most questions, so a reliable position can't be calculated. That's also a valid answer — this is a topic on which many people are still forming their views.",
    bands: [
      ["Strong opposition", "Your answers reject nearly all pillars of the Save Europe Act — both the concrete measures and the underlying premise of ethno-demographic preservation."],
      ["Leaning against", "You may agree with specific points (e.g., deporting criminals or better border control), but you reject the Act's central framing — particularly its categorical logic based on origin."],
      ["Mixed position", "You are genuinely split: you agree with a substantial share of the control measures, but resist the most radical proposals (remigration of legal residents, explicit demographic targets)."],
      ["Leaning in favor", "You align with most of the Act's proposals, though probably with reservations about some of the harshest measures or their ethnocultural rationale."],
      ["Strong alignment", "Your answers coincide with practically all of the Save Europe Act's proposals and premises."]
    ],
    bandSuffix: " with the Save Europe Act"
  }
};

// ---------- Questions (5 substantive options each; idk appended automatically) ----------
const Q = [
  {
    q: { pt: "O que deve o Estado proteger ativamente na identidade do seu país?",
         en: "What should the state actively protect about its country's identity?" },
    ctx: { pt: "Exemplo prático: 'proteger a composição étnica' significaria políticas com o objetivo explícito de manter a maioria étnica histórica. 'Proteger só a cultura' significaria financiar língua, tradições e património — independentemente da origem de quem os pratica.",
           en: "Practical example: 'protecting ethnic composition' would mean policies explicitly aimed at maintaining the historic ethnic majority. 'Protecting only culture' would mean funding language, traditions, and heritage — regardless of the origin of those who practice them." },
    tie: { pt: "Teste rápido: imagina que daqui a 50 anos a língua e a cultura continuam fortes, mas grande parte de quem as vive tem origens não-europeias. Isso seria um problema que o Estado deveria ter evitado? Se sim → escolhe a opção que inclui a composição étnica. Se o que importa é a continuidade da cultura, não a origem de quem a pratica → escolhe uma opção só cultural.",
           en: "Quick test: imagine in 50 years the language and culture remain strong, but many of the people living them have non-European origins. Would that be a problem the state should have prevented? If yes → pick the option that includes ethnic composition. If what matters is the continuity of the culture, not the origin of who practices it → pick a culture-only option." },
    opts: [
      { t: { pt: "A cultura, a língua E a composição étnica/demográfica da população nativa", en: "The culture, the language AND the ethnic/demographic composition of the native population" }, s: 100 },
      { t: { pt: "Sobretudo a cultura e a língua — mas na seleção de imigração pode dar-se preferência a países culturalmente próximos", en: "Mainly culture and language — but immigration selection may favor culturally closer countries" }, s: 70 },
      { t: { pt: "A cultura, a língua e as tradições — nunca a composição étnica", en: "The culture, language and traditions — never the ethnic composition" }, s: 50 },
      { t: { pt: "Apenas apoio ligeiro ao património e à língua; identidade é sobretudo assunto da sociedade civil", en: "Only light support for heritage and language; identity is mainly a civil society matter" }, s: 25 },
      { t: { pt: "Nada disso: identidade não é assunto para leis do Estado", en: "None of it: identity is not a matter for state law" }, s: 0 },
    ]
  },
  {
    q: { pt: "Como vês a mudança demográfica causada pela imigração nas últimas décadas na Europa?",
         en: "How do you see the demographic change caused by immigration in recent decades in Europe?" },
    ctx: { pt: "Facto neutro: em vários países da Europa Ocidental, a percentagem de residentes nascidos no estrangeiro ou com origem estrangeira cresceu significativamente desde os anos 90. A interpretação desse facto é o que divide opiniões.",
           en: "Neutral fact: in several Western European countries, the share of residents born abroad or with foreign origins has grown significantly since the 1990s. How to interpret that fact is what divides opinion." },
    tie: { pt: "Entre 'ameaça a reverter' e 'problema grave': achas que é preciso reverter ativamente o que já aconteceu (ameaça) ou sobretudo travar a tendência daqui para a frente (problema grave)? Entre 'evolução natural' e 'enriquecimento': a primeira vê custos e benefícios em equilíbrio; a segunda vê um saldo claramente positivo.",
           en: "Between 'threat to reverse' and 'serious problem': do you think what already happened must be actively reversed (threat) or mainly stopped going forward (serious problem)? Between 'natural evolution' and 'enrichment': the first sees costs and benefits in balance; the second sees a clearly positive net effect." },
    opts: [
      { t: { pt: "Uma ameaça existencial — uma 'substituição' que deve ser revertida", en: "An existential threat — a 'replacement' that must be reversed" }, s: 100 },
      { t: { pt: "Um problema grave que já foi longe demais nalguns países e deve ser travado", en: "A serious problem that has gone too far in some countries and must be stopped" }, s: 75 },

// ---------- State ----------
let lang = 'pt';
let idx = 0;
const answers = new Array(Q.length).fill(undefined); // stores original option index or 'idk'
// shuffle order per question (Fisher–Yates), computed once per page load
const order = Q.map(q => {
  const arr = q.opts.map((_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
});

// ---------- Elements ----------
const $ = id => document.getElementById(id);

function applyChrome() {
  const u = UI[lang];
  $('title').textContent = u.title;
  $('subtitle').textContent = u.subtitle;
  $('langBtn').textContent = u.langBtn;
  $('langBtn2').textContent = u.langBtn;
  $('shareBtn').textContent = u.shareBtn;
  $('shareBtn2').textContent = u.shareBtn;
  $('ctxsum').textContent = u.ctxsum;
  $('tiesum').textContent = u.tiesum;
  $('back').textContent = u.back;
  document.documentElement.lang = lang;
}

function render() {
  applyChrome();
  const u = UI[lang];
  const item = Q[idx];
  $('qnum').textContent = u.qOf(idx + 1, Q.length);
  $('qtext').textContent = item.q[lang];
  $('ctx').textContent = item.ctx[lang];
  $('tie').textContent = item.tie[lang];
  $('ctxbox').open = false;
  $('tiebox').open = false;
  $('prog').style.width = (idx / Q.length * 100) + '%';

  const opts = $('opts');
  opts.innerHTML = '';
  // substantive options in shuffled order
  order[idx].forEach(origI => {
    const o = item.opts[origI];
    const b = document.createElement('button');
    b.className = 'opt' + (answers[idx] === origI ? ' selected' : '');
    b.textContent = o.t[lang];
    b.onclick = () => { answers[idx] = origI; render(); };
    opts.appendChild(b);
  });
  // idk always last
  const bi = document.createElement('button');
  bi.className = 'opt idk' + (answers[idx] === 'idk' ? ' selected' : '');
  bi.textContent = u.idk;
  bi.onclick = () => { answers[idx] = 'idk'; render(); };
  opts.appendChild(bi);

  $('back').disabled = idx === 0;
  $('next').disabled = answers[idx] === undefined;
  $('next').textContent = idx === Q.length - 1 ? u.seeResult : u.next;
}

$('back').onclick = () => { if (idx > 0) { idx--; render(); } };
$('next').onclick = () => {
  if (idx < Q.length - 1) { idx++; render(); }
  else showResult();
};

let finalPct = null, undefinedResult = false;

function showResult() {
  let sum = 0, n = 0;
  answers.forEach((a, i) => {
    if (a !== 'idk' && a !== undefined) { sum += Q[i].opts[a].s; n++; }
  });

  undefinedResult = n < 4;
  finalPct = undefinedResult ? null : Math.round(sum / n);

  $('quiz').style.display = 'none';
  $('result').style.display = 'block';
  renderResult();
}

function renderResult() {
  const u = UI[lang];
  $('rtitle').textContent = u.rtitle;
  $('langBtn2').textContent = u.langBtn;
  $('shareBtn2').textContent = u.shareBtn;
  $('ml0').textContent = u.ml0;
  $('ml100').textContent = u.ml100;
  $('r1h').textContent = u.r1h;
  $('r1p').innerHTML = u.r1p;
  $('r2h').textContent = u.r2h;
  $('r2ul').innerHTML = u.r2items.map(x => '<li>' + x + '</li>').join('');
  $('r2p').innerHTML = u.r2p;
  $('r3h').textContent = u.r3h;
  $('rnote').textContent = u.rnote;
  $('rbtn').textContent = u.rbtn;

  if (undefinedResult) {
    $('pct').textContent = '—';
    $('band').textContent = u.undefinedBand;
    $('pin').style.left = '50%';
    $('r3p').textContent = u.undefinedText;
    return;
  }

  $('pct').textContent = finalPct + '%';
  $('pin').style.left = finalPct + '%';

  const bandIdx = finalPct < 20 ? 0 : finalPct < 40 ? 1 : finalPct < 60 ? 2 : finalPct < 80 ? 3 : 4;
  $('band').textContent = u.bands[bandIdx][0] + u.bandSuffix;
  $('r3p').textContent = u.bands[bandIdx][1];
}

function toggleLang() {
  lang = lang === 'pt' ? 'en' : 'pt';
  if ($('result').style.display === 'block') renderResult();
  else render();
  applyChrome();
  if ($('shareOverlay').classList.contains('open')) renderShareModal();
}
$('langBtn').onclick = toggleLang;
$('langBtn2').onclick = toggleLang;

// ---------- Share ----------
// The shareable URL: the configured SHARE_URL if set, otherwise the current
// location. Inside a sandboxed iframe location.href is the iframe's own URL,
// which is why SHARE_URL exists — set it after deploying so the link is right.
function shareUrl() {
  return (SHARE_URL && SHARE_URL.trim()) ? SHARE_URL.trim() : location.href.split('#')[0];
}

function renderShareModal() {
  const u = UI[lang];
  const url = shareUrl();
  $('shareHeading').textContent = u.shareHeading;
  $('shareCopyBtn').textContent = u.shareCopy;
  $('shareUrlInput').value = url;
  const waMsg = u.shareText + ' ' + url;
  $('shareWhatsApp').href = 'https://wa.me/?text=' + encodeURIComponent(waMsg);
  $('shareTelegram').href = 'https://t.me/share/url?url=' + encodeURIComponent(url) +
    '&text=' + encodeURIComponent(u.shareText);
}

function openShareModal() {
  renderShareModal();
  $('shareOverlay').classList.add('open');
  const input = $('shareUrlInput');
  // Pre-select so the user can immediately Ctrl+C / long-press → copy.
  setTimeout(() => { input.focus(); input.select(); }, 0);
}

function closeShareModal() {
  $('shareOverlay').classList.remove('open');
}

async function copyShareUrl() {
  const u = UI[lang];
  const input = $('shareUrlInput');
  const btn = $('shareCopyBtn');
  const url = input.value;
  let ok = false;
  // Async Clipboard API first; it's blocked in some sandboxed iframes.
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(url); ok = true; } catch (e) { ok = false; }
  }
  // Legacy fallback that works via a user gesture even where the async API is blocked.
  if (!ok) {
    try { input.focus(); input.select(); ok = document.execCommand('copy'); }
    catch (e) { ok = false; }
  }
  if (ok) {
    btn.textContent = u.shareCopyDone;
    setTimeout(() => { btn.textContent = UI[lang].shareCopy; }, 1800);
  }
}

async function doShare() {
  const u = UI[lang];
  const url = shareUrl();
  // Try the native share sheet FIRST on http(s) pages (mainly mobile). If it
  // succeeds we're done. If it's absent or throws — cancelled, or blocked by an
  // iframe permissions policy — fall through to the always-visible modal.
  if (/^https?:$/.test(location.protocol) && navigator.share) {
    try { await navigator.share({ title: u.title, text: u.shareText, url }); return; }
    catch (e) { /* fall through to modal */ }
  }
  openShareModal();
}

$('shareBtn').onclick = () => doShare();
$('shareBtn2').onclick = () => doShare();
$('shareClose').onclick = closeShareModal;
$('shareCopyBtn').onclick = copyShareUrl;
$('shareOverlay').onclick = (e) => { if (e.target === $('shareOverlay')) closeShareModal(); };
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('shareOverlay').classList.contains('open')) closeShareModal();
});

render();
</script>
</body>
</html>
